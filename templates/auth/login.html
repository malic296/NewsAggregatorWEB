{% extends "layouts/auth.html" %}
{% block title %} Login {% endblock %}

{% block content %}

<h1>LOGIN</h1>
<form method="POST">
    {{ form.csrf_token }}
    {{ form.credential.label }} {{ form.credential(size=10) }}
    {{ form.password.label }} {{ form.password(size=10) }}
    <input type="submit" value="login">
</form>

{% endblock %}
