{% extends "layouts/auth.html" %}
{% block title %} Error Occurred {% endblock %}

{% block content %}
<div class="container text-center mt-5">
    <div class="display-1 text-danger mb-4">
        <i class="bi bi-exclamation-triangle"></i> !
    </div>

    <h1 class="fw-bold">Something went wrong</h1>

    <div class="alert alert-light border shadow-sm my-4 py-3">
        <p class="lead mb-0">{{ message }}</p>
    </div>

    <p class="text-muted mb-4">
        Don't worry, it's not your fault. You can try to refresh the page or return to safety using the links below.
    </p>

    <hr class="my-4">

    <nav class="d-flex justify-content-center gap-3">
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary px-4">
            <i class="bi bi-person-fill"></i> Login
        </a>
        <a href="{{ url_for('auth.register') }}" class="btn btn-outline-secondary px-4">
            Register
        </a>
        <a href="{{ url_for('index') }}" class="btn btn-link">Go Home</a>
    </nav>
</div>
{% endblock %}
